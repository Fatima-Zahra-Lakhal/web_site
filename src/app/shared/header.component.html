<header
  @slideDown
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [ngClass]="{
    'bg-transparent md:bg-transparent backdrop-blur-3xl backdrop-blur-none border-b border-transparent shadow-none': !scrolled,
    'bg-white/95 md:bg-white/95 dark:bg-gray-900/95 backdrop-blur-md backdrop-blur-3xl border-b border-gray-200 dark:border-gray-800 shadow-lg': scrolled
  }">
  
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">

      <!-- Logo -->
      <div class="relative z-10">
        <img src="assets/lambdasoft.png"
             alt="LambdaSoft Logo"
             class="h-20 cursor-pointer"
             (click)="scrollToSection('home')" />
      </div>

      <!-- Navigation Desktop -->
      <nav
        class="hidden md:flex items-center space-x-2 rounded-full px-3 py-2 transition-all duration-500 relative z-10"
        [ngClass]="{
          'bg-white/10 backdrop-blur-none border border-transparent': !scrolled,
          'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-md': scrolled
        }">

        <button
          *ngFor="let item of navItems"
          (click)="scrollToSection(item.id)"
          class="px-5 py-2 rounded-full text-sm font-medium transition-all duration-300"
          [ngClass]="{
            'text-gray-200 dark:text-gray-300 hover:text-cyan-400': !scrolled,
            'text-gray-700 dark:text-gray-200 hover:text-cyan-600 dark:hover:text-cyan-400 hover:bg-gray-100 dark:hover:bg-gray-700/50': scrolled
          }">

          {{ languageService.t(item.key) }}

        </button>
      </nav>

      <!-- Right Buttons -->
      <div class="flex items-center gap-2 relative z-10">

        <!-- Language -->
        <button
          (click)="toggleLanguage()"
          class="p-3 rounded-xl border transition-all duration-500 flex items-center gap-2"
          [ngClass]="{
            'bg-white/10 md:bg-white/10 border-transparent text-gray-200 dark:text-gray-300 backdrop-blur-none': !scrolled,
            'bg-white md:bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 shadow-sm hover:shadow': scrolled
          }"
          [attr.aria-label]="'Changer de langue'">

          <lucide-icon [img]="Globe" size="18"></lucide-icon>
          <span class="hidden sm:inline">{{ languageService.language() | uppercase }}</span>

        </button>

        <!-- Theme -->
        <button
          (click)="toggleTheme()"
          class="p-3 rounded-xl border transition-all duration-500 flex items-center gap-2"
          [ngClass]="{
            'bg-white/10 md:bg-white/10 border-transparent text-gray-200 dark:text-gray-300 backdrop-blur-none': !scrolled,
            'bg-white md:bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 shadow-sm hover:shadow': scrolled
          }"
          [attr.aria-label]="'Changer de thème'">

          <lucide-icon
            *ngIf="themeService.theme() === 'light'"
            [img]="Moon">
          </lucide-icon>

          <lucide-icon
            *ngIf="themeService.theme() === 'dark'"
            [img]="Sun">
          </lucide-icon>

        </button>

        <!-- Mobile Menu Button -->
        <button
          class="md:hidden p-3 rounded-xl border transition-all duration-500"
          [ngClass]="{
            'bg-white/10 dark:bg-gray-800/10 border-transparent text-gray-200 dark:text-gray-300 backdrop-blur-sm': !scrolled,
            'bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 shadow-sm hover:shadow': scrolled
          }"
          (click)="toggleMenu()"
          [attr.aria-label]="mobileMenuOpen ? 'Fermer le menu' : 'Ouvrir le menu'">
          <span *ngIf="!mobileMenuOpen">☰</span>
          <span *ngIf="mobileMenuOpen">✕</span>
        </button>

      </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="mobileMenuOpen" 
         @mobileMenu
         class="mobile-menu-container md:hidden overflow-hidden rounded-2xl absolute left-4 right-4 top-20 z-20
                bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 shadow-xl">
      
      <nav class="py-2 px-2">
        
        <button
          *ngFor="let item of navItems"
          (click)="scrollToSection(item.id)"
          class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors
                 text-gray-700 dark:text-gray-200 hover:text-cyan-600 dark:hover:text-cyan-400 
                 hover:bg-gray-100 dark:hover:bg-gray-800">

          {{ languageService.t(item.key) }}

        </button>
        
      </nav>
    </div>

  </div>
</header>
