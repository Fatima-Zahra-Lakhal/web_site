<section id="services" class="relative py-10 overflow-hidden">

  <!-- Background -->
  <div class="absolute inset-0 bg-gradient-to-b from-background via-muted/20 to-background"></div>

  <div class="relative max-w-7xl mx-auto px-4">

    <!-- Header avec style inspiré -->
    <div class="text-center mb-20" @fadeUp>
      <div class="inline-block mb-6">
        <div class="px-6 py-2 rounded-full bg-gradient-to-r from-cyan-500/10 to-blue-500/10 border border-cyan-500/20">
          <span class="text-sm font-medium bg-gradient-to-r from-cyan-500 to-blue-500 bg-clip-text text-transparent">
             ✦ {{ languageService.t('services.badge') }} ✦   
          </span>
        </div>
      </div>

      <h2 class="text-3xl md:text-4xl lg:text-5xl mb-6 font-bold">
        {{ languageService.t('services.title') }}
      </h2>

      <p class="text-xl text-muted-foreground max-w-3xl mx-auto">
        {{ languageService.t('services.subtitle') }}
      </p>
    </div>

    <!-- Grid avec style inspiré - 2 colonnes pour desktop -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">

      <!-- Boucle sur les services avec nouveau design -->
      <div *ngFor="let service of services; let i = index"
           class="group relative" 
           @fadeUp>
        
        <!-- Card style inspiré du site ERP -->
        <div class="relative bg-card rounded-2xl p-6 lg:p-8 border border-border/50 hover:border-cyan-500/50 transition-all duration-300 hover:shadow-xl hover:shadow-cyan-500/5">
          
          <!-- Barre colorée en haut -->
          <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r {{service.color}} rounded-t-2xl"></div>
          
          <!-- Contenu -->
          <div class="mt-2">
            
            <!-- Icon et titre en ligne style ERP -->
            <div class="flex items-start gap-4 mb-4">
              <!-- Icon avec fond coloré -->
              <div class="w-14 h-14 rounded-xl bg-gradient-to-br {{service.color}}/10 flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
                <lucide-icon 
                  [img]="service.icon" 
                  class="h-7 w-7"
                  [class.text-cyan-500]="service.key === 'dev'"
                  [class.text-purple-500]="service.key === 'security'"
                  [class.text-amber-500]="service.key === 'engineering'"
                  [class.text-emerald-500]="service.key === 'consulting'"
                  [class.text-rose-500]="service.key === 'training'"
                  [class.text-indigo-500]="service.key === 'subcontracting'">
                </lucide-icon>
              </div>
              
              <!-- Titre -->
              <h3 class="text-xl lg:text-2xl font-semibold group-hover:text-cyan-500 transition-colors duration-300 flex-1">
                {{ getTranslatedTitle(service) }}
              </h3>
            </div>
            
            <!-- Description -->
            <p class="text-muted-foreground leading-relaxed text-sm lg:text-base">
              {{ getTranslatedDescription(service) }}
            </p>
            
            <!-- Lien "En savoir plus" style ERP -->
    <div class="mt-6 flex items-center gap-2 text-sm font-medium text-cyan-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
     [class.flex-row-reverse]="isArabic">
  <span>{{ languageService.t('services.learnMore') }}</span>
  <lucide-icon 
    [img]="isArabic ? ArrowUpLeft : ArrowUpRight" 
    class="h-4 w-4 transition-transform"
    [class.group-hover:translate-x-1]="!isArabic"
    [class.group-hover:-translate-x-1]="isArabic"
    [class.group-hover:-translate-y-1]="!isArabic"
    [class.group-hover:translate-y-1]="isArabic">
  </lucide-icon>
</div>
            
          </div>

          <!-- Effet de survol subtil -->
          <div class="absolute inset-0 rounded-2xl opacity-0 group-hover:opacity-10 transition-opacity duration-500 bg-gradient-to-br {{service.color}} pointer-events-none"></div>
          
        </div>

      </div>

    </div>

    <!-- CTA avec style inspiré -->
    <!-- <div class="text-center mt-16" @fadeUp>
      <a routerLink="/services" 
         class="group relative inline-flex items-center gap-3 px-8 py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 transition-all duration-300 shadow-lg shadow-cyan-500/25 hover:shadow-xl hover:shadow-cyan-500/30">
        <span class="text-white font-medium">{{ languageService.t('services.viewAll') }}</span>
        <lucide-icon
          [img]="ArrowUpRight"
          class="h-5 w-5 text-white transition-transform group-hover:translate-x-1 group-hover:-translate-y-1">
        </lucide-icon>
      </a>
    </div> -->

  </div>
</section>
