<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title() }}</title>
</head>
<body>
  <main class="main">
    <router-outlet></router-outlet>
  </main>
  
  <!-- Back to Top Button avec support RTL -->
  <button *ngIf="showBackToTop" 
          (click)="scrollToTop()"
          class="group fixed bottom-8 w-14 h-14 rounded-full 
                 bg-black/40 dark:bg-white/30 backdrop-blur-lg
                 text-white dark:text-gray-900
                 shadow-2xl hover:shadow-[0_0_30px_rgba(6,182,212,0.5)]
                 hover:scale-110 transition-all duration-300 z-50 
                 flex items-center justify-center
                 border border-white/30 dark:border-gray-900/30
                 hover:border-cyan-400/50
                 before:absolute before:inset-0 before:rounded-full 
                 before:bg-gradient-to-r before:from-cyan-500/0 before:via-cyan-500/30 before:to-cyan-500/0
                 before:translate-x-[-200%] hover:before:translate-x-[200%] before:transition-transform before:duration-1000
                 overflow-hidden
                 ring-2 ring-white/20 hover:ring-cyan-400/50
                 {{ isArabic ? 'left-8' : 'right-8' }}">
    
    <!-- Effet de glow interne -->
    <div class="absolute inset-0 rounded-full bg-gradient-to-br from-cyan-500/0 via-cyan-500/0 to-purple-500/0 
                group-hover:from-cyan-500/20 group-hover:via-cyan-500/5 group-hover:to-purple-500/20 
                transition-all duration-500"></div>
    
    <!-- Icône avec double effet -->
    <div class="relative z-10">
      <lucide-icon [img]="ArrowUp" 
                   class="h-6 w-6 group-hover:-translate-y-1 group-hover:scale-110 transition-all duration-300
                          drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">
      </lucide-icon>
      <div class="absolute inset-0 animate-ping opacity-0 group-hover:opacity-30">
        <lucide-icon [img]="ArrowUp" class="h-6 w-6"></lucide-icon>
      </div>
    </div>
    
    <!-- Tooltip avec support RTL -->
    <ng-container *ngIf="!isArabic; else arabicTooltip">
      <div class="absolute right-14 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 
                  transition-all duration-300 translate-x-2 group-hover:translate-x-0 pointer-events-none">
        <div class="bg-black/80 dark:bg-white/80 backdrop-blur-md text-white dark:text-gray-900 
                    text-[10px] py-0.5 px-1.5 rounded-md shadow-md border border-white/20 dark:border-gray-900/20
                    flex items-center gap-1 whitespace-nowrap">
          <lucide-icon [img]="ArrowUp" class="h-2.5 w-2.5"></lucide-icon>
        </div>
        <div class="absolute -left-0.5 top-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-black/80 dark:bg-white/80 
                    backdrop-blur-md rotate-45 border-l border-b border-white/20 dark:border-gray-900/20">
        </div>
      </div>
    </ng-container>
    
    <ng-template #arabicTooltip>
      <div class="absolute left-14 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 
                  transition-all duration-300 -translate-x-2 group-hover:translate-x-0 pointer-events-none">
        <div class="bg-black/80 dark:bg-white/80 backdrop-blur-md text-white dark:text-gray-900 
                    text-[10px] py-0.5 px-1.5 rounded-md shadow-md border border-white/20 dark:border-gray-900/20
                    flex items-center gap-1 whitespace-nowrap">
          <lucide-icon [img]="ArrowUp" class="h-2.5 w-2.5"></lucide-icon>
        </div>
        <div class="absolute -right-0.5 top-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-black/80 dark:bg-white/80 
                    backdrop-blur-md rotate-45 border-r border-t border-white/20 dark:border-gray-900/20">
        </div>
      </div>
    </ng-template>
    
  </button>
</body>
</html>
